layout: single
author_profile: true
title: "Bienvenidos a GIDA"
header:
  overlay_color: "#05070a" # Color base para que el texto sea blanco
---

<div id="mi-header-espacial" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none;">
  <canvas id="canvas-estrellas"></canvas>
</div>

<style>
  /* 2. Forzamos al encabezado del tema a ser el "padre" de nuestras estrellas */
  header.page__hero--overlay, 
  .page__hero--overlay,
  div[class*="hero"] { 
    position: relative !important;
    background-color: #05070a !important; /* Negro profundo */
    overflow: hidden;
  }

  /* Aseguramos que el contenido (texto) flote sobre el canvas */
  .page__hero-content, .wrapper {
    position: relative;
    z-index: 5;
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    const canvas = document.getElementById('canvas-estrellas');
    const ctx = canvas.getContext('2d');
    // Buscamos el header, si no lo halla por clase, lo busca por etiqueta
    const header = document.querySelector('.page__hero--overlay') || document.querySelector('header');
    const container = document.getElementById('mi-header-espacial');

    if (header && container) {
      header.appendChild(container); // Metemos nuestro div DENTRO del header
      
      function resize() {
        canvas.width = header.offsetWidth;
        canvas.height = header.offsetHeight;
      }

      let stars = Array.from({length: 150}, () => ({
        x: Math.random() * window.innerWidth,
        y: Math.random() * 500,
        r: Math.random() * 1.5,
        v: Math.random() * 0.4
      }));

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        stars.forEach(s => {
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
          s.y += s.v;
          if (s.y > canvas.height) s.y = 0;
        });
        requestAnimationFrame(animate);
      }

      window.addEventListener('resize', resize);
      resize();
      animate();
    }
  });
</script>
